pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "com.android.library" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

import groovy.json.JsonSlurper

def flutterProjectRoot = rootProject.projectDir.parentFile

def pluginsFile = new File(flutterProjectRoot, '.flutter-plugins-dependencies')
if (pluginsFile.exists()) {
    def object = new JsonSlurper().parseText(pluginsFile.text)
    object.plugins.android.each { androidPlugin ->
        if (androidPlugin.name == 'nordic_nrf_mesh_faradine') {
            println 'should include forked Nordic\'s ADK v3'
            def meshLibPath = androidPlugin.path.replace('android', '') + 'Android-nRF-Mesh-Library\\mesh\\'
            println 'meshLibPath = ' + meshLibPath
            include ':mesh'
            project(':mesh').projectDir = file(meshLibPath)
        }
    }
}

include ':app'